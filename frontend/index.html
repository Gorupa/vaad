<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaad — Court Case Tracker</title><style>
body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
background:#f9fafb;
margin:0;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
margin-top:0;
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ddd;
border-radius:6px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:30px;
}

.error{
color:#b91c1c;
background:#fef2f2;
padding:12px;
border-radius:6px;
margin-top:20px;
}

.success{
background:#ecfdf5;
padding:15px;
border-radius:6px;
}
</style></head><body><div class="container"><h1>Vaad</h1>
<p>Track Indian court cases instantly.</p><input id="cnr" placeholder="Enter CNR Number (Example: MHAU010012342023)"><button onclick="searchCase()">Search Case</button>

<div id="output" class="result"></div></div><script>

/* Backend API */
const API = "https://vaad-wnul.onrender.com";

/* Wake Render server */
fetch(`${API}/api/health`).catch(()=>{});

/* Search function */
async function searchCase(){

const cnr = document.getElementById("cnr").value.trim();
const output = document.getElementById("output");

if(!cnr){
output.innerHTML='<div class="error">Please enter a CNR number.</div>';
return;
}

output.innerHTML="Fetching case details...";

try{

const res = await fetch(`${API}/api/cnr`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({cnr})
});

const json = await res.json();

if(!json.success){
output.innerHTML=`<div class="error">${json.error}</div>`;
return;
}

const data = json.data;

output.innerHTML=`
<div class="success">
<h3>${data.case_title || "Case Details"}</h3>
<p><b>CNR:</b> ${data.cnr_number || data.cnr}</p>
<p><b>Status:</b> ${data.case_status || data.status}</p>
<p><b>Next Hearing:</b> ${data.next_hearing_date || "Not available"}</p>
</div>
`;

}catch(err){

output.innerHTML=`<div class="error">
Network error: ${err.message}
</div>`;

}

}

</script></body>
</html>
