<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaad — Court Case Tracker</title>
<meta name="description" content="Track Indian court cases instantly. Powered by ecourt.js.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
:root{
--bg:#ffffff;
--bg-alt:#f9fafb;
--border:#e5e7eb;
--text-main:#111827;
--text-muted:#6b7280;
--primary:#2563eb;
--primary-hover:#1d4ed8;
--primary-bg:#eff6ff;
--error-text:#b91c1c;
--error-bg:#fef2f2;
--radius:8px;
--max-w:640px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Inter',system-ui;
background:var(--bg-alt);
color:var(--text-main);
display:flex;
flex-direction:column;
min-height:100vh;
}

.nav{
background:white;
border-bottom:1px solid var(--border);
padding:16px 24px;
display:flex;
justify-content:space-between;
}

.nav-brand{
font-size:1.5rem;
font-weight:800;
color:var(--primary);
text-decoration:none;
}

.hero{
max-width:var(--max-w);
margin:auto;
padding:50px 20px 20px;
text-align:center;
}

.hero h1{
font-size:2rem;
margin-bottom:10px;
}

.hero p{
color:var(--text-muted);
}

.search-card{
max-width:var(--max-w);
margin:20px auto;
padding:0 20px;
}

.search-container{
background:white;
border:1px solid var(--border);
border-radius:var(--radius);
}

.search-form{
padding:24px;
}

.field-label{
font-size:.75rem;
font-weight:600;
margin-bottom:6px;
display:block;
}

input{
width:100%;
padding:10px 12px;
border:1px solid var(--border);
border-radius:6px;
font-size:.95rem;
}

.btn-search{
width:100%;
margin-top:20px;
padding:12px;
background:var(--primary);
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.btn-search:hover{
background:var(--primary-hover);
}

.spinner{
width:16px;
height:16px;
border:2px solid rgba(255,255,255,0.4);
border-top-color:white;
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

.results{
max-width:var(--max-w);
margin:auto;
padding:0 20px 40px;
}

.error-box{
background:var(--error-bg);
color:var(--error-text);
border:1px solid #fecaca;
padding:14px;
border-radius:var(--radius);
margin-top:20px;
}

.info-grid{
background:white;
border:1px solid var(--border);
border-radius:var(--radius);
margin-top:20px;
}

.info-row{
display:flex;
padding:12px 16px;
border-bottom:1px solid var(--border);
font-size:.9rem;
}

.info-row:last-child{border-bottom:none;}

.info-key{
width:140px;
color:var(--text-muted);
}

.footer{
margin-top:auto;
text-align:center;
padding:20px;
border-top:1px solid var(--border);
font-size:.8rem;
color:var(--text-muted);
background:white;
}
</style></head><body><nav class="nav">
<a class="nav-brand" href="#">Vaad</a>
</nav><div class="hero">
<h1>Track court cases simply.</h1>
<p>Search Indian court cases by CNR number.</p>
</div><div class="search-card">
<div class="search-container">
<div class="search-form"><label class="field-label">CNR Number</label>
<input id="cnr-input" placeholder="e.g. MHAU010012342023">

<button class="btn-search" id="search-btn" onclick="handleSearch()">
<span id="btn-text">Search Case</span>
</button></div>
</div>
</div><div class="results" id="results"></div><footer class="footer">
Vaad — Open source court case tracker
</footer><script>

const API="https://vaad-wnul.onrender.com/api";

function setLoading(on){
const btn=document.getElementById("search-btn");
btn.disabled=on;
btn.innerHTML=on?
'<div class="spinner"></div> Fetching…':
'Search Case';
}

async function handleSearch(){

const cnr=document.getElementById("cnr-input").value.trim();
if(!cnr)return;

setLoading(true);
document.getElementById("results").innerHTML="";

try{

const res=await fetch(`${API}/cnr`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({cnr})
});

const json=await res.json();

if(!res.ok||!json.success){
throw new Error(json.error||"Case fetch failed");
}

renderCase(json.data);

}catch(e){

document.getElementById("results").innerHTML=
`<div class="error-box">${e.message}</div>`;

}

setLoading(false);

}

function renderCase(data){

let html=`<div class="info-grid">`;

html+=`<div class="info-row"><div class="info-key">CNR</div><div>${data.cnr||"-"}</div></div>`;
html+=`<div class="info-row"><div class="info-key">Status</div><div>${data.status||"-"}</div></div>`;
html+=`<div class="info-row"><div class="info-key">Next Hearing</div><div>${data.nextHearingDate||"Not listed"}</div></div>`;

html+=`</div>`;

document.getElementById("results").innerHTML=html;

}

/* Wake Render backend */
fetch(`${API}/health`).catch(()=>{});

</script></body>
</html>
